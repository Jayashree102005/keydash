<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyDash | Create Account</title>
   <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; transition: background 0.3s, color 0.3s; }
    
    /* Dark Theme updated to premium Dark Navy (#0F172A) instead of pure black */
    [data-theme="dark"] body { background-color: #0F172A; color: #f8fafc; }
    [data-theme="dark"] .auth-card { background-color: #1E293B; border-color: #334155; }
    [data-theme="dark"] input { background-color: #0F172A; border-color: #334155; color: #ffffff; }
    [data-theme="dark"] input:focus { border-color: #F97316; }
    [data-theme="dark"] .btn-social { background-color: #0F172A; border-color: #334155; color: #f8fafc; }
    [data-theme="dark"] .btn-social:hover { background-color: #334155; }
    [data-theme="dark"] .theme-btn { background-color: #1E293B !important; border-color: #334155 !important; color: #ffffff !important; }
    [data-theme="dark"] .text-slate-900 { color: #ffffff !important; }
    [data-theme="dark"] .title { color: #ffffff !important; }
    [data-theme="dark"] .text-slate-700 { color: #cbd5e1 !important; }
    [data-theme="dark"] .text-slate-500 { color: #94a3b8 !important; }
    [data-theme="dark"] .text-slate-400 { color: #94a3b8 !important; }
    [data-theme="dark"] .divider-line { background-color: #334155; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-start md:items-center justify-center p-4 pt-16 sm:p-6 sm:pt-6 relative">

  <!-- Floating Controls -->
  <div class="fixed top-4 right-4 sm:top-6 sm:right-6 flex gap-3 z-50">
    <button onclick="toggleTheme()" class="theme-btn bg-white border border-slate-200 p-2.5 sm:p-3 rounded-xl shadow-sm hover:scale-105 transition text-slate-700"> <i class="themeIcon bi bi-moon-stars-fill"></i></button>
    <button onclick="toggleRTL()" class="theme-btn bg-white border border-slate-200 p-2.5 sm:p-3 rounded-xl shadow-sm hover:scale-105 transition text-slate-700"> <i class="bi bi-arrow-left-right"></i></button>
  </div>

  <div class="auth-card bg-white p-6 sm:p-8 md:p-12 rounded-2xl md:rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-md my-4 md:my-0">
    
    <!-- Brand Name / Logo -->
    <div class="text-center mb-8">
      <h1 class="text-2xl text-slate-900 tracking-tight">
        <a href="index.html" class="flex items-center justify-center gap-2.5">
          <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-[#F59E0B] shadow-md shadow-[#F59E0B]/20">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" class="w-5 h-5">
              <circle cx="11" cy="11" r="5.5" stroke="white" stroke-width="2.2" fill="none"/>
              <line x1="15.5" y1="11" x2="27" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
              <line x1="24" y1="11" x2="24" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="20" y1="11" x2="20" y2="15" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="3" y1="21" x2="9" y2="21" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
              <line x1="5" y1="24" x2="15" y2="24" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
              <line x1="3" y1="27" x2="19" y2="27" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
            </svg>
          </span>
          <span class="flex items-baseline"><span class="text-slate-900">Key</span><span class="text-[#F59E0B]">Dash</span></span>
        </a>
      </h1>
      <h2 class="text-2xl font-bold mt-4">Create Account</h2>
    </div>

    <!-- SIGNUP FORM -->
    <form class="space-y-4">
      <input type="text" placeholder="Full Name" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] transition-colors">
      <input type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] transition-colors">
      
      <div class="relative">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 pe-12 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] transition-colors">
        <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-[#F97316] transition-colors" onclick="togglePass('pass')"></i>
      </div>

      <div class="relative">
        <input type="password" id="cpass" placeholder="Confirm Password" class="w-full p-4 pe-12 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] transition-colors">
        <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-[#F97316] transition-colors" onclick="togglePass('cpass')"></i>
      </div>

      <div class="flex items-center gap-2 text-sm">
        <input type="checkbox" id="terms" class="accent-[#F97316] w-4 h-4 cursor-pointer">
        <label for="terms" class="text-slate-500 cursor-pointer">I agree to the Terms & Privacy</label>
      </div>
      
      <button class="w-full bg-[#F97316] text-white font-bold py-4 rounded-xl hover:bg-[#ea580c] shadow-lg shadow-[#F97316]/25 hover:-translate-y-0.5 transition-all duration-300">
        Sign Up
      </button>
    </form>

    <!-- SOCIAL LOGIN -->
    <div class="my-6 flex items-center gap-4">
      <div class="divider-line flex-grow h-px bg-slate-200"></div>
      <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center leading-tight">Or sign up<br class="sm:hidden"> with</span>
      <div class="divider-line flex-grow h-px bg-slate-200"></div>
    </div>

    <div class="flex gap-3">
      <button class="btn-social flex-1 flex items-center justify-center gap-1.5 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition font-semibold text-xs sm:text-sm text-slate-700">
        <i class="bi bi-google text-red-500 text-base sm:text-lg"></i> <span class="hidden sm:inline">Google</span>
      </button>
      <button class="btn-social flex-1 flex items-center justify-center gap-1.5 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition font-semibold text-xs sm:text-sm text-slate-700">
        <i class="bi bi-facebook text-blue-600 text-base sm:text-lg"></i> <span class="hidden sm:inline">Facebook</span>
      </button>
      <button class="btn-social flex-1 flex items-center justify-center gap-1.5 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition font-semibold text-xs sm:text-sm text-slate-700">
        <i class="bi bi-apple text-base sm:text-lg"></i> <span class="hidden sm:inline">Apple</span>
      </button>
    </div>

    <!-- Login Link -->
    <div class="text-center mt-6 text-sm">
      <p class="title text-slate-500">Already a user? <a href="login.html" class="text-[#F97316] font-bold hover:text-[#ea580c] hover:underline transition-colors">Log In</a></p>
    </div>
  </div>

  <script>
    function togglePass(id) {
      const input = document.getElementById(id);
      const icon = input.nextElementSibling;
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye-slash", "bi-eye");
      } else {
        input.type = "password";
        icon.classList.replace("bi-eye", "bi-eye-slash");
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const themeIcon = document.querySelector('.themeIcon');
      
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        themeIcon.classList.replace('bi-brightness-high-fill', 'bi-moon-stars-fill');
      } else {
        html.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('bi-moon-stars-fill', 'bi-brightness-high-fill');
      }
    }

    function toggleRTL() {
      document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
    }
  </script>
</body>
</html>
