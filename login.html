<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyDash | Login</title>
     <link rel="icon" href="images/logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        /* Dark Theme using premium Dark Navy (#0F172A) */
        [data-theme="dark"] body {
            background-color: #0F172A;
            color: #f8fafc;
        }

        [data-theme="dark"] .auth-card {
            background-color: #1E293B;
            border-color: #334155;
        }

        [data-theme="dark"] input {
            background-color: #0F172A;
            border-color: #334155;
            color: #ffffff;
        }

        [data-theme="dark"] input:focus {
            border-color: #F97316;
        }

        [data-theme="dark"] .btn-social {
            background-color: #0F172A;
            border-color: #334155;
            color: #f8fafc;
        }

        [data-theme="dark"] .btn-social:hover {
            background-color: #334155;
        }

        [data-theme="dark"] .theme-btn {
            background-color: #1E293B !important;
            border-color: #334155 !important;
            color: #ffffff !important;
        }

        [data-theme="dark"] .text-slate-900 {
            color: #ffffff !important;
        }

        [data-theme="dark"] .title {
            color: #ffffff !important;
        }

        [data-theme="dark"] .text-slate-700 { color: #cbd5e1 !important; }
        [data-theme="dark"] .text-slate-500 { color: #94a3b8 !important; }
        [data-theme="dark"] .text-slate-400 { color: #94a3b8 !important; }
        [data-theme="dark"] .divider-line {
            background-color: #334155;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 sm:p-6">

    <!-- Floating Controls -->
    <div class="w-full max-w-md flex justify-end gap-3 mb-3 sm:mb-4">
        <button onclick="toggleTheme()"
            class="theme-btn bg-white border border-slate-200 p-2.5 sm:p-3 rounded-xl shadow-sm hover:scale-105 transition text-slate-700">
            <i class="themeIcon bi bi-moon-stars-fill"></i></button>
        <button onclick="toggleRTL()"
            class="theme-btn bg-white border border-slate-200 p-2.5 sm:p-3 rounded-xl shadow-sm hover:scale-105 transition text-slate-700">
            <i class="bi bi-arrow-left-right"></i></button>
    </div>

    <div
        class="auth-card bg-white p-6 sm:p-8 md:p-12 rounded-2xl md:rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-md my-4 md:my-0">

        <!-- Brand Name / Logo -->
        <div class="text-center mb-8">
            <h1 class="text-2xl text-slate-900 font-bold tracking-tight">
                <a href="index.html" class="flex items-center justify-center gap-2">
                    <i class="title bi bi-car-front-fill text-[#F97316]"></i>
                    KeyDash
                </a>
            </h1>
            <h2 class="text-2xl font-bold mt-4">Welcome Back</h2>
            <p class="text-slate-500 text-sm mt-1">Please log in to your account.</p>
        </div>

        <!-- LOGIN FORM -->
        <form class="space-y-4">
            <input type="email" placeholder="Email Address"
                class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] transition-colors">

            <div class="relative">
                <input type="password" id="pass" placeholder="Password"
                    class="w-full p-4 pe-12 rounded-xl border border-slate-200 outline-none focus:border-[#F97316] transition-colors">
                <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-[#F97316] transition-colors"
                    onclick="togglePass('pass')"></i>
            </div>

            <div class="flex flex-row items-center justify-between gap-2 text-xs sm:text-sm">

                <!-- Remember Me -->
                <label for="remember" class="flex items-center gap-2 w-fit">
                    <input type="checkbox" id="remember" class="w-4 h-4 accent-[#F97316] cursor-pointer flex-shrink-0">
                    <span class="text-slate-500 whitespace-nowrap">Remember me</span>
                </label>

                <!-- Forgot Password -->
                <a href="#"
                    class="text-[#F97316] font-semibold hover:text-[#ea580c] transition-colors whitespace-nowrap">
                    Forgot Password?
                </a>

            </div>

            <button
                class="w-full bg-[#F97316] text-white font-bold py-4 rounded-xl hover:bg-[#ea580c] shadow-lg shadow-[#F97316]/25 hover:-translate-y-0.5 transition-all duration-300">
                Log In
            </button>
        </form>

        <!-- SOCIAL LOGIN -->
        <div class="my-6 flex items-center gap-4">
            <div class="divider-line flex-grow h-px bg-slate-200"></div>
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center leading-tight">Or
                login<br class="sm:hidden"> with</span>
            <div class="divider-line flex-grow h-px bg-slate-200"></div>
        </div>

        <div class="flex gap-3">
      <button class="btn-social flex-1 flex items-center justify-center gap-1.5 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition font-semibold text-xs sm:text-sm text-slate-700">
        <i class="bi bi-google text-red-500 text-base sm:text-lg"></i> <span class="hidden sm:inline">Google</span>
      </button>
      <button class="btn-social flex-1 flex items-center justify-center gap-1.5 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition font-semibold text-xs sm:text-sm text-slate-700">
        <i class="bi bi-facebook text-blue-600 text-base sm:text-lg"></i> <span class="hidden sm:inline">Facebook</span>
      </button>
      <button class="btn-social flex-1 flex items-center justify-center gap-1.5 p-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition font-semibold text-xs sm:text-sm text-slate-700">
        <i class="bi bi-apple text-base sm:text-lg"></i> <span class="hidden sm:inline">Apple</span>
      </button>
    </div>
        <!-- Sign Up Link -->
        <div class="text-center mt-6 text-sm">
            <p class="title text-slate-500">Don't have an account? <a href="sign.html"
                    class="text-[#F97316] font-bold hover:text-[#ea580c] hover:underline transition-colors">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("bi-eye-slash", "bi-eye");
            } else {
                input.type = "password";
                icon.classList.replace("bi-eye", "bi-eye-slash");
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const themeIcon = document.querySelector('.themeIcon');

            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('bi-brightness-high-fill', 'bi-moon-stars-fill');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-brightness-high-fill');
            }
        }

        function toggleRTL() {
            document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
        }
    </script>
</body>

</html>
