  <circle cx="18" cy="16" r="5" fill="white"/>
  <!-- Key shaft -->
  <rect x="25" y="13" width="18" height="6" rx="2" fill="#F59E0B"/>
  <!-- Key teeth -->
  <rect x="36" y="19" width="3" height="5" rx="1" fill="#F59E0B"/>
  <rect x="30" y="19" width="3" height="4" rx="1" fill="#F59E0B"/>
  <!-- Speed/dash lines -->
  <rect x="4" y="30" width="12" height="2.5" rx="1.25" fill="#F59E0B" opacity="0.3"/>
  <rect x="8" y="34" width="16" height="2.5" rx="1.25" fill="#F59E0B" opacity="0.5"/>
  <rect x="4" y="38" width="22" height="2.5" rx="1.25" fill="#F59E0B" opacity="0.7"/>
  <rect x="10" y="42" width="28" height="2.5" rx="1.25" fill="#F59E0B" opacity="1"/>
</svg>
