<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#F59E0B"/>
  <!-- Key head -->
  <circle cx="12" cy="12" r="6" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Key shaft -->
  <line x1="17" y1="12" x2="27" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Key teeth -->
  <line x1="24" y1="12" x2="24" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="12" x2="20" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Dash lines for speed -->
  <line x1="4" y1="22" x2="10" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="25" x2="16" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="4" y1="28" x2="20" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
</svg>
